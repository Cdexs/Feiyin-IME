<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recording Overlay</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      user-select: none;
      -webkit-user-select: none;
      -webkit-app-region: drag; /* 允许拖拽窗口 */
    }

    .overlay-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10, 10, 15, 0.85);
      border: 1px solid rgba(255, 107, 53, 0.3);
      border-radius: 8px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      transition: border-color 0.2s ease;
    }

    /* 预览状态：深色边框（与 Win32 Overlay 一致） */
    .overlay-container.preview {
      border-color: rgb(6, 6, 9);
    }

    .content {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 24px;
      color: #ffffff;
    }

    /* 录音状态：脉冲动画圆点 */
    .recording-dot {
      width: 12px;
      height: 12px;
      background: #ff6b35;
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.2);
      }
    }

    .status-text {
      font-size: 14px;
      font-weight: 500;
      color: #ffffff;
    }

    /* 处理中：旋转动画 */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 107, 53, 0.3);
      border-top-color: #ff6b35;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 错误状态 */
    .error-icon {
      width: 16px;
      height: 16px;
      background: #dc2626;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: bold;
      color: white;
    }

    /* 预览状态 */
    .preview-text {
      max-width: 250px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.9);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* 波形条（录音中） */
    .waveform {
      display: flex;
      align-items: center;
      gap: 2px;
      height: 20px;
    }

    .waveform-bar {
      width: 3px;
      background: #ff6b35;
      border-radius: 1px;
      animation: waveform 0.8s ease-in-out infinite;
    }

    .waveform-bar:nth-child(1) { animation-delay: 0s; height: 8px; }
    .waveform-bar:nth-child(2) { animation-delay: 0.1s; height: 12px; }
    .waveform-bar:nth-child(3) { animation-delay: 0.2s; height: 16px; }
    .waveform-bar:nth-child(4) { animation-delay: 0.3s; height: 12px; }
    .waveform-bar:nth-child(5) { animation-delay: 0.4s; height: 8px; }

    @keyframes waveform {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }
  </style>
</head>
<body>
  <div class="overlay-container" id="overlay">
    <div class="content" id="content">
      <!-- 动态内容将由 JavaScript 根据状态更新 -->
    </div>
  </div>

  <script>
    const { invoke } = window.__TAURI__.tauri;
    const { listen } = window.__TAURI__.event;

    const content = document.getElementById('content');
    const overlay = document.getElementById('overlay');

    // 渲染不同状态的 UI
    function renderState(state) {
      console.log('Overlay state changed:', state);

      // 清除预览状态类
      overlay.classList.remove('preview');

      switch (state) {
        case 'Recording':
          content.innerHTML = `
            <div class="recording-dot"></div>
            <div class="waveform">
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
              <div class="waveform-bar"></div>
            </div>
            <div class="status-text">录音中...</div>
          `;
          break;

        case 'Processing':
          content.innerHTML = `
            <div class="spinner"></div>
            <div class="status-text">处理中...</div>
          `;
          break;

        case 'Preview':
          // 预览状态使用深色边框
          overlay.classList.add('preview');
          content.innerHTML = `
            <div class="preview-text">预览文本...</div>
          `;
          break;

        default:
          content.innerHTML = `
            <div class="status-text">就绪</div>
          `;
      }
    }

    // 监听来自 Rust 后端的状态更新事件
    listen('overlay-state-changed', (event) => {
      renderState(event.payload);
    });

    // 初始状态
    renderState('Recording');

    // 可选：点击隐藏（未来可扩展）
    document.addEventListener('click', () => {
      // invoke('hide_recording_overlay').catch(err => console.error(err));
    });
  </script>
</body>
</html>
